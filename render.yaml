services:
  - type: web
    name: the-ledger
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: ledger-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/ledger.db
